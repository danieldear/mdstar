name: MarkwellQuickLook
options:
  bundleIdPrefix: dev.mdstar
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

targets:
  MarkwellQuickLook:
    type: app-extension
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: "XPC!"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: "com.apple.quicklook.preview"
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PreviewProvider"
          NSExtensionAttributes:
            QLIsDataBasedPreview: true
            QLSupportedContentTypes:
              - "public.markdown"
              - "net.daringfireball.markdown"
              - "public.plain-text"
              - "public.text"
              - "public.json"
              - "public.xml"
              - "public.yaml"
              - "public.toml"
              - "public.comma-separated-values-text"
              - "public.delimited-values-text"
              - "public.source-code"
              - "org.iso.sql"
              - "com.microsoft.ini"
              - "org.rust-lang.rust-script"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mdstar.desktop.quicklook
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_ENTITLEMENTS: "MarkwellQuickLook.entitlements"
        SKIP_INSTALL: "NO"
