<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Star</title>

  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-ui:   -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "Menlo", "Monaco", monospace;

      /* Layout */
      --titlebar-h: 54px;   /* overlay titlebar zone */
      --sidebar-w:  240px;
      --content-top-safe: 64px;

      /* Light */
      --bg:           rgba(248, 250, 255, 0.93);
      --bg-shell-1:   rgba(255, 255, 255, 0.72);
      --bg-shell-2:   rgba(243, 247, 255, 0.78);
      --bg-sidebar:   rgba(245, 248, 255, 0.28);
      --sidebar-tint: rgba(30, 32, 36, 0.02);
      --sidebar-stroke: rgba(30, 41, 59, 0.22);
      --bg-content:   rgb(247, 250, 255);
      --bg-editor:    rgba(255, 255, 255, 0.76);
      --border:       rgba(16, 24, 40, 0.09);
      --border-md:    rgba(16, 24, 40, 0.16);
      --border-lg:    rgba(16, 24, 40, 0.23);
      --text-1:       rgba(23, 31, 45, 0.96);
      --text-2:       rgba(51, 63, 82, 0.86);
      --text-3:       rgba(85, 97, 119, 0.76);
      --text-4:       rgba(107, 118, 138, 0.68);
      --accent:       #0a7cff;
      --warn:         #f28a00;

      /* Floating action cluster */
      --fac-bg:     rgba(255, 255, 255, 0.74);
      --fac-border: rgba(16, 24, 40, 0.14);
      --fac-divider: rgba(16, 24, 40, 0.13);
      --fac-shadow: none;

      /* Markdown */
      --md-code-bg: rgba(39, 96, 186, 0.10);
      --md-code-bd: rgba(62, 117, 205, 0.28);
      --md-hr:      rgba(74, 123, 206, 0.24);
      --md-link:    #3d92ff;
      --blockquote-bg: rgba(10, 124, 255, 0.06);
      --table-even-bg: rgba(8, 20, 36, 0.03);
      --code-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 12px rgba(15,23,42,0.08);
      --img-shadow: 0 4px 24px rgba(15, 23, 42, 0.14);

      --t1: 130ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --t2: 260ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --spring: 380ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           rgba(16, 19, 29, 0.91);
        --bg-shell-1:   rgba(12, 16, 28, 0.88);
        --bg-shell-2:   rgba(10, 14, 25, 0.90);
        --bg-sidebar:   rgba(14, 18, 28, 0.24);
        --sidebar-tint: rgba(0, 0, 0, 0.08);
        --sidebar-stroke: rgba(148, 163, 184, 0.18);
        --bg-content:   rgb(10, 14, 25);
        --bg-editor:    rgba(24, 27, 39, 0.80);
        --border:       rgba(255, 255, 255, 0.08);
        --border-md:    rgba(255, 255, 255, 0.13);
        --border-lg:    rgba(255, 255, 255, 0.19);
        --text-1:       rgba(238, 242, 251, 0.95);
        --text-2:       rgba(198, 207, 228, 0.80);
        --text-3:       rgba(157, 168, 194, 0.78);
        --text-4:       rgba(129, 140, 169, 0.66);
        --fac-bg:       rgba(24, 28, 42, 0.94);
        --fac-border:   rgba(255, 255, 255, 0.08);
        --fac-divider:  rgba(255, 255, 255, 0.14);
        --md-code-bg:   rgba(90, 128, 206, 0.16);
        --md-code-bd:   rgba(124, 162, 236, 0.35);
        --md-hr:        rgba(124, 162, 236, 0.26);
        --blockquote-bg: rgba(10,132,255,0.07);
        --table-even-bg: rgba(255,255,255,0.022);
        --code-shadow:  inset 0 1px 0 rgba(255,255,255,0.04), 0 6px 16px rgba(0,0,0,0.22);
        --img-shadow:   0 4px 24px rgba(0,0,0,0.12);
      }
    }

    html, body {
      height: 100%;
      overflow: hidden;
      /* MUST be transparent so NSVisualEffectView vibrancy shows through
         the webview wherever CSS backgrounds are also transparent. */
      background: transparent;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── Window shell ───────────────────────────────────────────────────────── */
    .window {
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-radius: 14px;
      overflow: hidden;
      background: transparent;
    }

    /* Native titlebar zone */
    .titlebar-region {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--titlebar-h);
      z-index: 80;
      -webkit-app-region: drag;
      pointer-events: auto;
    }

    /* Everything interactive must opt out of drag */
    .fac, .sidebar, .content-area, .scroll-pane, .editor-pane, button, textarea, a {
      -webkit-app-region: no-drag;
    }

    /* ── Top actions (flat native-like toolbar) ───────────────────────────── */
    .fac {
      position: fixed;
      top: 11px;
      right: 12px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      background: var(--fac-bg);
      border: 1px solid var(--fac-border);
      border-radius: 12px;
      box-shadow: var(--fac-shadow);
      z-index: 120;
    }

    /* ── Body ────────────────────────────────────────────────────────────────── */
    .body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      position: relative;
      z-index: 90;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, var(--sidebar-tint), var(--sidebar-tint)),
        var(--bg-sidebar);
      backdrop-filter: blur(48px) saturate(2.35) contrast(1.14) brightness(0.98);
      -webkit-backdrop-filter: blur(48px) saturate(2.35) contrast(1.14) brightness(0.98);
      border-right: 1px solid var(--sidebar-stroke);
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.05);
      overflow: hidden;
      transition: width var(--t2), min-width var(--t2),
                  opacity var(--t2), border-color var(--t2);
    }
    .sidebar.collapsed {
      width: 0; min-width: 0;
      opacity: 0;
      border-right-color: transparent;
    }

    .sidebar-top {
      padding: calc(var(--titlebar-h) + 8px) 14px 6px;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .sidebar-section {
      padding: 0 8px 6px;
      flex-shrink: 0;
    }
    .sidebar-section-label {
      padding: 2px 8px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .file-tree {
      max-height: 220px;
      overflow-y: auto;
      padding: 0 2px 2px;
      scrollbar-width: thin;
    }
    .file-tree::-webkit-scrollbar { width: 3px; }
    .file-tree::-webkit-scrollbar-thumb { background: var(--border-lg); border-radius: 2px; }
    .file-item {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      border-radius: 7px;
      padding: 4px 8px;
      color: var(--text-2);
      font-family: var(--font-ui);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background var(--t1), color var(--t1);
    }
    .file-item:hover { background: var(--border); color: var(--text-1); }
    .file-item.active {
      background: rgba(0,122,255,0.10);
      color: var(--accent);
    }
    .file-item.empty {
      cursor: default;
      color: var(--text-3);
    }
    .file-item.empty:hover { background: transparent; }

    .outline {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
      scrollbar-width: thin;
    }
    .outline::-webkit-scrollbar { width: 3px; }
    .outline::-webkit-scrollbar-thumb { background: var(--border-lg); border-radius: 2px; }

    .outline-item {
      display: block;
      padding: 4px 8px;
      border-radius: 7px;
      font-size: 12.5px;
      line-height: 1.35;
      color: var(--text-2);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: background var(--t1), color var(--t1);
    }
    .outline-item:hover  { background: var(--border); color: var(--text-1); }
    .outline-item.active { background: rgba(0,122,255,0.10); color: var(--accent); }
    .outline-item[data-level="1"] { font-weight: 600; font-size: 13px; color: var(--text-1); margin-top: 4px; }
    .outline-item[data-level="2"] { padding-left: 20px; }
    .outline-item[data-level="3"] { padding-left: 32px; font-size: 12px; }
    .outline-item[data-level="4"],
    .outline-item[data-level="5"],
    .outline-item[data-level="6"] { padding-left: 42px; font-size: 11.5px; color: var(--text-3); }

    /* Sidebar footer — metadata (replaces the old status bar) */
    .sidebar-footer {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sf-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 0;
      font-size: 11.5px;
      color: var(--text-3);
    }
    .sf-row .ico { font-size: 10px; width: 14px; text-align: center; }
    .sf-row .val { color: var(--text-2); font-variant-numeric: tabular-nums; font-weight: 500; }
    /* hide footer until a file is loaded */
    .sidebar-footer { display: none; }
    .sidebar-footer.visible { display: block; }

    /* ── Content area ─────────────────────────────────────────────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      min-width: 0;
      position: relative;   /* anchor for the floating action cluster */
      padding-top: 0;
      background:
        linear-gradient(180deg, var(--bg-shell-1), var(--bg-shell-2)),
        var(--bg-content);
    }

    /* Editor pane */
    .editor-pane {
      width: 0; min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg-editor);
      border-right: 0 solid transparent;
      flex-shrink: 0;
      transition: width var(--t2), min-width var(--t2), border-width var(--t2);
    }
    .editor-pane.open {
      width: 50%;
      min-width: 300px;
      border-right: 1px solid var(--border-md);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-label-text {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .editor-save-btn {
      height: 24px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid var(--border-md);
      background: transparent;
      color: var(--text-2);
      font-family: var(--font-ui);
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t1), color var(--t1), border-color var(--t1);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .editor-save-btn:hover { background: var(--border); color: var(--text-1); }
    .editor-save-btn.dirty {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .editor-save-btn.dirty:hover { filter: brightness(1.08); }

    .editor-textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 18px 22px 40px;
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.72;
      background: transparent;
      color: var(--text-1);
      overflow-y: auto;
      scrollbar-width: thin;
      tab-size: 2;
      caret-color: var(--accent);
      user-select: text;
      -webkit-user-select: text;
    }
    .editor-textarea::-webkit-scrollbar { width: 4px; }
    .editor-textarea::-webkit-scrollbar-thumb { background: var(--border-lg); border-radius: 2px; }

    /* Scroll pane for content */
    .scroll-pane {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      scrollbar-width: thin;
      position: relative;
    }
    .scroll-pane::-webkit-scrollbar { width: 6px; }
    .scroll-pane::-webkit-scrollbar-thumb { background: var(--border-lg); border-radius: 3px; }

    .fac-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-size: 14px;
      transition: background var(--t1), color var(--t1), transform var(--t1);
      flex-shrink: 0;
    }
    .fac-btn:hover  { background: rgba(255,255,255,0.08); color: var(--text-1); }
    .fac-btn:active { transform: scale(0.90); }
    .fac-btn.on     { color: var(--accent); background: rgba(0,122,255,0.10); }
    .fac-btn:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }
    .fac-btn:disabled:hover {
      background: transparent;
      color: var(--text-2);
    }

    .fac-div {
      width: 1px;
      height: 16px;
      background: var(--fac-divider);
      margin: 0 2px;
      flex-shrink: 0;
    }

    /* Dirty dot on the edit button */
    .dirty-dot {
      position: absolute;
      top: -2px; right: -2px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--warn);
      border: 1.5px solid var(--bg);
      display: none;
    }
    .fac-edit-wrap {
      position: relative;
    }
    .fac-edit-wrap .dirty-dot.show { display: block; }

    /* ── Welcome state ───────────────────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--titlebar-h) - 60px);
      padding: 60px 40px;
      text-align: center;
      gap: 16px;
    }
    .welcome-icon {
      width: 68px; height: 68px;
      border-radius: 17px;
      background: linear-gradient(150deg, rgba(0,122,255,0.14) 0%, rgba(0,122,255,0.06) 100%);
      border: 1px solid rgba(0,122,255,0.13);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 4px 20px rgba(0,122,255,0.09);
      margin-bottom: 6px;
    }
    .welcome h2 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-1);
    }
    .welcome p { font-size: 13.5px; color: var(--text-2); max-width: 310px; line-height: 1.55; }
    .welcome-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 16px rgba(0,122,255,0.34);
      transition: filter var(--t1), transform var(--t1);
    }
    .welcome-cta:hover  { filter: brightness(1.08); }
    .welcome-cta:active { transform: scale(0.97); }
    .welcome-hint { font-size: 12px; color: var(--text-3); }
    .welcome-hint kbd {
      background: var(--border);
      border: 1px solid var(--border-md);
      border-radius: 5px;
      padding: 1px 6px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-2);
    }

    /* ── Markdown typography ─────────────────────────────────────────────────── */
    .md-content {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: calc(clamp(18px, 3vw, 34px) + var(--content-top-safe)) clamp(18px, 4vw, 48px) 100px;
      user-select: text;
      -webkit-user-select: text;
      overflow-wrap: anywhere;
    }

    .md-content h1 {
      font-size: 2em; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2;
      color: var(--text-1);
      margin: 40px 0 18px; padding-bottom: 12px;
      border-bottom: 1px solid var(--md-hr);
    }
    .md-content h1:first-child { margin-top: 0; }

    .md-content h2 {
      font-size: 1.45em; font-weight: 650; letter-spacing: -0.025em; line-height: 1.25;
      color: var(--text-1);
      margin: 36px 0 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--md-hr);
    }
    .md-content h3 {
      font-size: 1.2em; font-weight: 600; letter-spacing: -0.015em;
      color: var(--text-1); margin: 28px 0 10px;
    }
    .md-content h4, .md-content h5, .md-content h6 {
      font-size: 1em; font-weight: 600; color: var(--text-1); margin: 22px 0 8px;
    }
    .md-content p {
      font-size: 16px; line-height: 1.78; color: var(--text-1); margin-bottom: 18px;
    }
    .md-content a {
      color: var(--md-link); text-decoration: none;
      border-bottom: 1px solid rgba(0,122,255,0.28);
      transition: border-color var(--t1);
    }
    .md-content a:hover { border-bottom-color: var(--accent); }
    .md-content ul, .md-content ol {
      font-size: 16px; line-height: 1.78; color: var(--text-1);
      margin-bottom: 18px; padding-left: 26px;
    }
    .md-content li { margin-bottom: 4px; }
    .md-content li > ul, .md-content li > ol { margin-bottom: 2px; margin-top: 4px; }
    .md-content input[type="checkbox"] {
      appearance: auto;
      -webkit-appearance: checkbox;
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      margin-right: 8px;
      vertical-align: -2px;
      opacity: 1;
      filter: none;
    }
    .md-content input[type="checkbox"][disabled] {
      opacity: 0.95;
      pointer-events: none;
    }
    .md-content blockquote {
      margin: 24px 0; padding: 14px 20px;
      border-left: 3px solid var(--accent);
      background: var(--blockquote-bg);
      border-radius: 0 8px 8px 0;
    }
    .md-content blockquote p { color: var(--text-2); font-style: italic; margin-bottom: 0; }
    .md-content code {
      font-family: var(--font-mono); font-size: 0.865em;
      background: var(--md-code-bg); border: 1px solid var(--md-code-bd);
      border-radius: 5px; padding: 1px 5px;
    }
    .md-content pre {
      background: var(--md-code-bg); border: 1px solid var(--md-code-bd);
      border-radius: 12px; padding: 20px 24px; overflow-x: auto; margin: 22px 0;
      box-shadow: var(--code-shadow);
    }
    .md-content pre code {
      font-family: var(--font-mono); font-size: 13.5px; line-height: 1.65;
      background: transparent; border: none; padding: 0; border-radius: 0;
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
    }
    .md-content hr { border: none; border-top: 1px solid var(--md-hr); margin: 36px 0; }
    .md-content img { max-width: 100%; height: auto; border-radius: 10px; box-shadow: var(--img-shadow); }
    .md-content table {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin: 0;
      font-size: 15px;
      border-radius: 10px; overflow: hidden; border: 1px solid var(--border-md);
    }
    .md-table-wrap {
      width: 100%;
      overflow-x: hidden;
      overflow-y: hidden;
      margin: 22px 0;
      border-radius: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .md-table-wrap::-webkit-scrollbar { height: 8px; }
    .md-table-wrap::-webkit-scrollbar-thumb { background: var(--border-lg); border-radius: 4px; }
    .md-content th {
      background: var(--md-code-bg);
      font-size: 11.5px; font-weight: 650; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border-md);
      color: var(--text-2);
    }
    .md-content td {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      color: var(--text-1); line-height: 1.5;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      vertical-align: top;
    }
    .md-content th code,
    .md-content td code {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .md-content th pre,
    .md-content td pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      overflow-x: clip;
      margin: 8px 0;
      padding: 12px 14px;
    }
    .md-content tr:last-child td { border-bottom: none; }
    .md-content tr:nth-child(even) td { background: var(--table-even-bg); }
    .md-content strong { font-weight: 650; }
    .md-content del { color: var(--text-3); }

    /* Mermaid */
    .mermaid-diagram {
      margin: 22px 0; padding: 24px;
      background: var(--md-code-bg); border: 1px solid var(--md-code-bd);
      border-radius: 12px; overflow-x: auto; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .mermaid-diagram svg { max-width: 100%; height: auto; }

    /* ── Drop overlay ───────────────────────────────────────────────────────── */
    .drop-overlay {
      position: fixed; inset: 0;
      background: rgba(0,122,255,0.05);
      border: 2px dashed rgba(0,122,255,0.35);
      border-radius: 12px;
      display: none;
      align-items: center; justify-content: center;
      z-index: 999;
      font-size: 16px; font-weight: 600; color: var(--accent); gap: 10px;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    .drop-overlay.show { display: flex; }

    /* ── Animations ─────────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    .md-content { animation: fadeUp 200ms var(--t1); }

    @keyframes facIn {
      from { opacity: 0; transform: scale(0.88) translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }
    .fac { animation: facIn 320ms var(--spring); }
  </style>
</head>
<body>

<div class="window">

  <!-- Native title bar clearance — transparent, fully draggable.
       Dragging is handled in JavaScript to keep action buttons responsive. -->
  <div class="titlebar-region" id="titlebar-region"></div>

  <!-- Body: sidebar + content -->
  <div class="body">

    <!-- ── Sidebar ────────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-label">Workspace</div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Files</div>
        <nav class="file-tree" id="file-tree">
          <button class="file-item empty" type="button">No workspace</button>
        </nav>
      </div>

      <div class="sidebar-section-label">Headings</div>
      <nav class="outline" id="outline">
        <span style="display:block;padding:8px 10px;font-size:12px;color:var(--text-3)">
          No document open
        </span>
      </nav>

      <!-- File metadata lives here — replaces the old bottom status bar -->
      <div class="sidebar-footer" id="sidebar-footer">
        <div class="sf-row">
          <span class="ico">✦</span>
          <span class="val" id="sf-words">—</span>
          <span style="color:var(--text-3)">words</span>
        </div>
        <div class="sf-row">
          <span class="ico">⏱</span>
          <span class="val" id="sf-time">—</span>
          <span style="color:var(--text-3)">min read</span>
        </div>
        <div class="sf-row">
          <span class="ico">↵</span>
          <span class="val" id="sf-lines">—</span>
          <span style="color:var(--text-3)">lines</span>
        </div>
      </div>
    </aside>

    <!-- ── Content area ───────────────────────────────────────────────────── -->
    <div class="content-area">
      <div class="fac" id="fac">
        <button class="fac-btn" id="btn-back" title="Back" style="display:none">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 3.5L4.5 8l5 4.5"/>
            <path d="M5 8h7"/>
          </svg>
        </button>

        <div class="fac-div" id="fac-div-back" style="display:none"></div>

        <button class="fac-btn" id="btn-open" title="Open File (⌘O)">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 4.5h4l1.5 2h7.5v7h-13v-9z"/>
          </svg>
        </button>

        <div class="fac-div" id="fac-div-open" style="display:none"></div>

        <button class="fac-btn" id="btn-reload" title="Reload (⌘R)" style="display:none">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5a5.47 5.47 0 0 1 3.89 1.61L13.5 5.5"/>
            <polyline points="13.5,2.5 13.5,5.5 10.5,5.5"/>
          </svg>
        </button>

        <div class="fac-edit-wrap" id="fac-edit-wrap" style="display:none">
          <button class="fac-btn" id="btn-edit" title="Edit Mode (⌘E)">
            <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11.5 2.5l2 2-8 8H3.5v-2l8-8z"/>
              <line x1="9.5" y1="4.5" x2="11.5" y2="6.5"/>
            </svg>
          </button>
          <div class="dirty-dot" id="dirty-dot"></div>
        </div>

        <div class="fac-div" id="fac-div2" style="display:none"></div>

        <button class="fac-btn on" id="btn-sidebar-float" title="Toggle Sidebar (⌘⇧S)">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="1.5" y="2.5" width="13" height="11" rx="2"/>
            <line x1="5.5" y1="2.5" x2="5.5" y2="13.5"/>
          </svg>
        </button>
      </div>

      <!-- Editor pane (slides in when Edit mode is active) -->
      <div class="editor-pane" id="editor-pane">
        <div class="editor-header">
          <span class="editor-label-text">Source</span>
          <button class="editor-save-btn" id="btn-save" title="Save (⌘S)">Save</button>
        </div>
        <textarea
          class="editor-textarea"
          id="editor-textarea"
          placeholder="Start writing…"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        ></textarea>
      </div>

      <!-- Scroll pane: welcome or rendered markdown -->
      <div class="scroll-pane" id="scroll">

        <!-- Welcome -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">📄</div>
          <h2>MD Star</h2>
          <p>Open a document to start reading.<br>Drag and drop anywhere, or click below.</p>
          <button class="welcome-cta" id="btn-open-welcome">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1.5 4.5h4l1.5 2h7.5v7h-13v-9z"/>
            </svg>
            Open File…
          </button>
          <p class="welcome-hint">Or press <kbd>⌘ O</kbd></p>
        </div>

        <!-- Rendered markdown -->
        <div class="md-content" id="md-content" style="display:none"></div>

      </div><!-- .scroll-pane -->

    </div><!-- .content-area -->

  </div><!-- .body -->

</div><!-- .window -->

<!-- Drop overlay -->
<div class="drop-overlay" id="drop-overlay">
  <svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1.5 4.5h4l1.5 2h7.5v7h-13v-9z"/>
  </svg>
  Drop to open
</div>

<!-- ════════════════════════════════════════════════════════════════════════
     APP LOGIC
════════════════════════════════════════════════════════════════════════ -->
<script>
  const invoke = window.__TAURI__.core.invoke;
  const listen  = window.__TAURI__.event.listen;
  const appWindow = window.__TAURI__.window.getCurrentWindow();

  // ── State ─────────────────────────────────────────────────────────────────
  let currentPath   = null;
  let currentSource = '';
  let sidebarOpen   = true;
  let editMode      = false;
  let dirty         = false;
  let workspaceFiles = [];
  let previewTimer  = null;
  const backHistory = [];
  const appRenderableExts = new Set([
    'md','markdown','txt','text','json','xml','yaml','yml','toml','csv',
    'rs','kt','kts','py','js','jsx','ts','tsx','java','go','c','h','cpp','hpp',
    'cs','swift','sh','bash','zsh','ini','conf','sql','log'
  ]);

  const $ = id => document.getElementById(id);

  // ── Boot ──────────────────────────────────────────────────────────────────
  setupDragDrop();
  setupKeyboard();
  setupTitlebarDrag();
  loadInitialOpenPath();

  $('btn-open').addEventListener('click', openFilePicker);
  $('btn-open-welcome').addEventListener('click', openFilePicker);
  $('btn-back').addEventListener('click', goBack);
  $('btn-sidebar-float').addEventListener('click', toggleSidebar);
  $('btn-reload').addEventListener('click', onReload);
  $('btn-edit').addEventListener('click', toggleEditMode);
  $('btn-save').addEventListener('click', saveFile);
  setupDocumentLinkRouting();

  $('editor-textarea').addEventListener('input', () => {
    setDirty(true);
    clearTimeout(previewTimer);
    previewTimer = setTimeout(livePreview, 320);
  });

  listen('file-changed', () => { if (currentPath && !dirty) loadFile(currentPath); });
  listen('open-paths', event => loadFirstSupportedPath(event.payload, { pushHistory: true }));

  // ── Window movement ───────────────────────────────────────────────────────
  function setupTitlebarDrag() {
    $('titlebar-region').addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.closest('button, textarea, input, select, a, .fac')) return;
      e.detail === 2 ? appWindow.toggleMaximize() : appWindow.startDragging();
    });
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    $('sidebar').classList.toggle('collapsed', !sidebarOpen);
    $('btn-sidebar-float').classList.toggle('on', sidebarOpen);
  }

  // ── Edit mode ─────────────────────────────────────────────────────────────
  function toggleEditMode() { editMode ? closeEditMode() : openEditMode(); }

  function openEditMode() {
    editMode = true;
    $('editor-textarea').value = currentSource;
    $('editor-pane').classList.add('open');
    $('btn-edit').classList.add('on');
    $('btn-reload').style.display = 'none';
    $('fac-div-open').style.display = '';
    setTimeout(() => $('editor-textarea').focus(), 280);
  }

  async function closeEditMode() {
    if (dirty) await saveFile();
    editMode = false; dirty = false;
    $('editor-pane').classList.remove('open');
    $('btn-edit').classList.remove('on');
    $('btn-reload').style.display = '';
    $('fac-div-open').style.display = '';
    setDirty(false);
  }

  function onReload() {
    if (editMode) livePreview();
    else if (currentPath) loadFile(currentPath);
  }

  // ── Save ──────────────────────────────────────────────────────────────────
  async function saveFile() {
    if (!currentPath) return;
    const content = $('editor-textarea').value;
    try {
      await invoke('save_file', { path: currentPath, content });
      currentSource = content;
      setDirty(false);
    } catch (e) { console.error('save_file:', e); }
  }

  function setDirty(val) {
    dirty = val;
    $('dirty-dot').classList.toggle('show', val);
    $('btn-save').classList.toggle('dirty', val);
    document.title = val
      ? '● ' + (currentPath?.split('/').pop() ?? 'Untitled')
      : (currentPath?.split('/').pop() ?? 'MD Star');
  }

  // ── Live preview ──────────────────────────────────────────────────────────
  async function livePreview() {
    const source = $('editor-textarea').value;
    try {
      const r = await invoke('render_source', { source, path: currentPath });
      updateContent(r);
    } catch (_) {}
  }

  // ── File I/O ──────────────────────────────────────────────────────────────
  async function openFilePicker() {
    const path = await invoke('pick_file');
    if (path) loadPath(path);
  }

  async function loadInitialOpenPath() {
    try {
      const paths = await invoke('initial_open_paths');
      loadFirstSupportedPath(paths, { pushHistory: false });
    } catch (e) { console.error('initial_open_paths:', e); }
  }

  function loadFirstSupportedPath(paths, options = {}) {
    const path = (paths ?? [])
      .map(normalizeLocalPath)
      .find(p => typeof p === 'string' && p.length > 0);
    if (path) loadPath(path, options);
  }

  async function loadPath(path, options = {}) {
    const targetPath = normalizeLocalPath(path);
    if (!targetPath) return;

    const ext = targetPath.split('.').pop()?.toLowerCase();
    if (ext && appRenderableExts.has(ext)) {
      await loadFile(targetPath, options);
      return;
    }

    try {
      const entries = await invoke('list_workspace_files', { path: targetPath });
      workspaceFiles = Array.isArray(entries) ? entries : [];
      renderWorkspaceFiles();
      const first = workspaceFiles[0];
      if (first?.path) await loadFile(first.path, options);
    } catch (e) {
      console.error('loadPath workspace:', e);
    }
  }

  async function loadFile(path, options = {}) {
    const targetPath = normalizeLocalPath(path);
    if (!targetPath) return;
    if (options.pushHistory && currentPath && currentPath !== targetPath) {
      const last = backHistory[backHistory.length - 1];
      if (last !== currentPath) backHistory.push(currentPath);
    }
    updateBackButton();

    try {
      const r = await invoke('render_file', { path: targetPath });
      currentPath   = targetPath;
      currentSource = r.source;
      if (editMode) $('editor-textarea').value = currentSource;
      renderResult(r);
      await refreshWorkspaceFiles(targetPath);
      invoke('watch_file', { path: targetPath });
    } catch (e) { console.error('render_file:', e); }
  }

  async function refreshWorkspaceFiles(path) {
    try {
      const entries = await invoke('list_workspace_files', { path });
      workspaceFiles = Array.isArray(entries) ? entries : [];
      renderWorkspaceFiles();
    } catch (e) {
      console.error('list_workspace_files:', e);
      workspaceFiles = [];
      renderWorkspaceFiles();
    }
  }

  function renderWorkspaceFiles() {
    const tree = $('file-tree');
    tree.innerHTML = '';
    if (!workspaceFiles.length) {
      const empty = document.createElement('button');
      empty.type = 'button';
      empty.className = 'file-item empty';
      empty.textContent = 'No workspace';
      tree.appendChild(empty);
      return;
    }

    for (const entry of workspaceFiles) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'file-item';
      btn.style.paddingLeft = `${8 + (entry.depth || 0) * 14}px`;
      btn.textContent = entry.relative_path || entry.path?.split('/').pop() || 'Untitled';
      if (entry.path === currentPath) btn.classList.add('active');
      btn.addEventListener('click', () => {
        if (entry.path && entry.path !== currentPath) {
          loadFile(entry.path, { pushHistory: true });
        }
      });
      tree.appendChild(btn);
    }
  }

  function updateBackButton() {
    const visible = backHistory.length > 0;
    $('btn-back').style.display = visible ? '' : 'none';
    $('fac-div-back').style.display = visible ? '' : 'none';
    $('btn-back').disabled = !visible;
  }

  function goBack() {
    const prev = backHistory.pop();
    updateBackButton();
    if (prev) loadFile(prev, { pushHistory: false });
  }

  function setupDocumentLinkRouting() {
    $('md-content').addEventListener('click', e => {
      const anchor = e.target.closest('a[href]');
      if (!anchor) return;

      const href = anchor.getAttribute('href')?.trim() ?? '';
      const path = resolveMarkdownLinkPath(href);
      if (!path) return;

      e.preventDefault();
      loadFile(path, { pushHistory: true });
    });
  }

  function resolveMarkdownLinkPath(href) {
    if (!href || href.startsWith('#')) return '';
    if (/^(https?:|mailto:|tel:)/i.test(href)) return '';

    let raw = href.split('#')[0].split('?')[0];
    if (!raw) return '';

    if (raw.startsWith('file://')) {
      raw = normalizeLocalPath(raw);
    } else if (!raw.startsWith('/')) {
      if (!currentPath) return '';
      try {
        const baseDir = currentPath.slice(0, currentPath.lastIndexOf('/') + 1);
        raw = decodeURIComponent(new URL(raw, `file://${baseDir}`).pathname);
      } catch (_) {
        return '';
      }
    }

    const ext = raw.split('.').pop()?.toLowerCase();
    return ext && appRenderableExts.has(ext) ? raw : '';
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderResult(r) {
    // Switch welcome → content
    $('welcome').style.display    = 'none';
    $('md-content').style.display = 'block';

    // Show file-specific FAC controls
    $('btn-reload').style.display     = editMode ? 'none' : '';
    $('fac-edit-wrap').style.display  = '';
    $('fac-div2').style.display       = '';
    $('fac-div-open').style.display   = '';

    // Sidebar footer
    $('sf-words').textContent = r.word_count.toLocaleString();
    $('sf-time').textContent  = r.read_minutes;
    $('sf-lines').textContent = r.line_count.toLocaleString();
    $('sidebar-footer').classList.add('visible');

    updateContent(r);

    // Window title = filename (macOS shows this in the native title bar)
    document.title = r.file_name;
  }

  function updateContent(r) {
    const el = $('md-content');
    el.innerHTML = r.html;
    wrapTables(el);
    addHeadingIds(el);
    renderMermaid(el);
    if (!editMode) {
      el.style.animation = 'none';
      requestAnimationFrame(() => { el.style.animation = ''; });
    }
    buildOutline(r.headings);
    // Keep sidebar counts live during editing
    if (r.word_count) {
      $('sf-words').textContent = r.word_count.toLocaleString();
      $('sf-time').textContent  = r.read_minutes;
    }
  }

  function wrapTables(container) {
    const tables = container.querySelectorAll('table');
    for (const table of tables) {
      if (table.parentElement?.classList.contains('md-table-wrap')) continue;
      const wrap = document.createElement('div');
      wrap.className = 'md-table-wrap';
      table.replaceWith(wrap);
      wrap.appendChild(table);
    }
  }

  // ── Mermaid ───────────────────────────────────────────────────────────────
  let mermaidN = 0;
  let mermaidReady = null;

  async function ensureMermaidReady() {
    if (window.mermaid) return window.mermaid;
    if (!mermaidReady) {
      mermaidReady = new Promise((resolve) => {
        let attempts = 0;
        const maxAttempts = 100;
        const iv = setInterval(() => {
          if (window.mermaid) {
            clearInterval(iv);
            resolve(window.mermaid);
            return;
          }
          attempts += 1;
          if (attempts >= maxAttempts) {
            clearInterval(iv);
            resolve(null);
          }
        }, 50);
      });
    }
    return mermaidReady;
  }

  async function renderMermaid(container) {
    const blocks = container.querySelectorAll('pre > code.language-mermaid, pre > code.mermaid, pre > code[class*="language-mermaid"]');
    if (!blocks.length) return;
    const mermaidLib = await ensureMermaidReady();
    if (!mermaidLib) return;

    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    mermaidLib.initialize({
      startOnLoad: false,
      theme: dark ? 'dark' : 'neutral',
      fontFamily: '-apple-system, "SF Pro Text", sans-serif',
      fontSize: 14,
      securityLevel: 'loose',
    });

    for (const code of blocks) {
      const id = 'mmd-' + (++mermaidN);
      try {
        const { svg } = await mermaidLib.render(id, code.textContent ?? '');
        const wrap = document.createElement('div');
        wrap.className = 'mermaid-diagram';
        wrap.innerHTML = svg;
        code.closest('pre')?.replaceWith(wrap);
      } catch (e) {
        console.warn('mermaid:', e?.message ?? e);
      }
    }
  }

  // ── Heading IDs + outline ─────────────────────────────────────────────────
  function addHeadingIds(container) {
    container.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach((el, i) => {
      el.id = slugify(el.textContent) || 'h-' + i;
    });
  }
  function slugify(t) {
    return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function buildOutline(headings) {
    const nav = $('outline');
    nav.innerHTML = '';
    if (!headings.length) {
      nav.innerHTML = '<span style="display:block;padding:8px 10px;font-size:12px;color:var(--text-3)">No headings</span>';
      return;
    }
    headings.forEach(h => {
      const a = document.createElement('a');
      a.className = 'outline-item';
      a.dataset.level = h.level;
      a.textContent = h.text;
      a.href = '#';
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(h.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        nav.querySelectorAll('.outline-item').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
      });
      nav.appendChild(a);
    });
    setupScrollSpy(headings);
  }

  function setupScrollSpy(headings) {
    $('scroll').addEventListener('scroll', () => {
      let hit = null;
      for (const h of headings) {
        const el = document.getElementById(h.id);
        if (el && el.getBoundingClientRect().top < 130) hit = h.id;
      }
      $('outline').querySelectorAll('.outline-item').forEach((el, i) => {
        el.classList.toggle('active', headings[i]?.id === hit);
      });
    }, { passive: true });
  }

  // ── Keyboard shortcuts ────────────────────────────────────────────────────
  function setupKeyboard() {
    document.addEventListener('keydown', e => {
      if (!e.metaKey && !e.ctrlKey) return;
      switch (e.key) {
        case 'o': e.preventDefault(); openFilePicker(); break;
        case 'e': e.preventDefault(); toggleEditMode(); break;
        case 's': e.preventDefault(); if (editMode) saveFile(); break;
        case 'S': e.preventDefault(); toggleSidebar(); break;
        case 'r': e.preventDefault(); onReload(); break;
        case '+': case '=': e.preventDefault(); zoomContent(1); break;
        case '-':           e.preventDefault(); zoomContent(-1); break;
        case '0':           e.preventDefault(); zoomContent(0); break;
      }
    });
  }

  let zoom = 16;
  function zoomContent(d) {
    zoom = d === 0 ? 16 : Math.max(12, Math.min(24, zoom + d));
    $('md-content').style.fontSize = zoom + 'px';
  }

  // ── Drag & drop ───────────────────────────────────────────────────────────
  function setupDragDrop() {
    const overlay = $('drop-overlay');

    const showOverlay = () => overlay.classList.add('show');
    const hideOverlay = () => overlay.classList.remove('show');

    const handleDrop = paths => {
      hideOverlay();
      const resolved = (Array.isArray(paths) ? paths : [])
        .map(normalizeLocalPath)
        .filter(Boolean);
      if (resolved.length > 0) loadFirstSupportedPath(resolved);
    };

    // ── Tauri 2.x: four separate named events (no shared "type" field) ────
    // tauri://drag-drop  → { paths: string[], position: {...} }
    // tauri://drag-enter → { paths: string[], position: {...} }
    // tauri://drag-over  → { position: {...} }   (no paths)
    // tauri://drag-leave → {}
    listen('tauri://drag-drop',  ev => handleDrop(ev?.payload?.paths)).catch(() => {});
    listen('tauri://drag-enter', ()  => showOverlay()).catch(() => {});
    listen('tauri://drag-over',  ()  => showOverlay()).catch(() => {});
    listen('tauri://drag-leave', ()  => hideOverlay()).catch(() => {});

    // ── DOM fallback (fires when Tauri does not intercept the drop) ────────
    let enterCount = 0;
    document.addEventListener('dragenter', e => {
      e.preventDefault();
      if (++enterCount === 1) showOverlay();
    });
    document.addEventListener('dragleave', () => {
      if (--enterCount <= 0) { enterCount = 0; hideOverlay(); }
    });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault();
      enterCount = 0;
      hideOverlay();
      handleDrop(extractDomDropPaths(e.dataTransfer));
    });
  }

  function normalizeLocalPath(raw) {
    if (typeof raw !== 'string') return '';
    if (!raw) return '';
    if (!raw.startsWith('file://')) return raw;
    try {
      const u = new URL(raw);
      return decodeURIComponent(u.pathname);
    } catch (_) {
      return raw;
    }
  }

  function extractDomDropPaths(dataTransfer) {
    if (!dataTransfer) return [];
    const paths = [];

    // Some runtimes expose direct file paths on File objects.
    const files = Array.from(dataTransfer.files ?? []);
    for (const f of files) {
      if (typeof f?.path === 'string' && f.path.length > 0) paths.push(f.path);
    }

    // macOS Finder frequently provides URI lists.
    const uriList = dataTransfer.getData?.('text/uri-list');
    if (uriList) {
      for (const line of uriList.split(/\r?\n/)) {
        const value = line.trim();
        if (value && !value.startsWith('#')) paths.push(value);
      }
    }

    // Some apps expose a single file URL/path via text/plain.
    const plain = dataTransfer.getData?.('text/plain');
    if (plain) paths.push(...plain.split(/\r?\n/).map(v => v.trim()).filter(Boolean));

    return paths;
  }
</script>
